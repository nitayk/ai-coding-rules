# Skill group definitions for --skills / --no-skills filtering.
# A skill can appear in multiple groups. Groups are additive (union).
#
# Usage:
#   --skills core,git               # sync only core + git groups
#   --no-skills scala,office        # sync all MINUS scala + office groups
#   --skills all                    # sync everything
#
# When --skills is omitted, the "defaults" value is used.
#
# NOTE: Anthropic skills (docx, pdf, pptx, xlsx, etc.) require installation
# directly: npx skills add anthropics/skills

defaults: all
exclude_from_defaults: scala

# Agent groups — controls which agents are synced alongside skills.
# When --skills is used, only agents whose group overlaps the selected
# skill groups are installed. Agents NOT listed in any group are always installed.
agent_groups:
  # Universal core agents (mapped from core/quality/git skill groups)
  core:
    - architect
    - code-architect
    - code-explorer
    - code-reviewer
    - code-simplifier
    - documentation-writer
    - git-workflow-specialist
    - performance-optimizer
    - planner
    - security-auditor
    - security-reviewer
    - test-runner
    - verifier
    - build-error-resolver

  # Go-specific agents (mapped from golang skill group)
  golang:
    - go-build-resolver
    - go-reviewer

  # Observability agents (mapped from observability skill group)
  observability:
    - monitoring-analyst
    - data-validator

# Rule groups — tags for .mdc rule files under rules/.
# Rules live in the submodule checkout (not individually copied). The `group:`
# frontmatter field is a passive annotation for agents/humans.
rule_groups:
  # No org-specific rule groups in the generic profile.
  # Add custom groups here if needed.

groups:
